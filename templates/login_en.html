<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarbonPass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C853;
            --primary-light: #00E676;
            --primary-dark: #00A844;
            --accent: #00B0FF;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-hint: #999999;
            --border: #E8ECF0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* Language Switcher */
        .lang-switch {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1000;
            display: flex;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .lang-btn {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            background: transparent;
        }

        .lang-btn:hover {
            background: var(--bg);
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Header */
        .header {
            background: var(--card-bg);
            padding: 60px 24px 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--primary);
        }

        .nav-menu {
            display: flex;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        /* Main */
        .main {
            max-width: 420px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px 32px;
            text-align: center;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.1) 0%, rgba(0, 176, 255, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .google-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 200, 83, 0.03);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-hint);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .skip-btn {
            display: inline-block;
            padding: 12px 24px;
            color: var(--text-secondary);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .skip-btn:hover {
            color: var(--primary);
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-hint);
            font-size: 12px;
        }

        .footer span {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="lang-switch">
        <a href="/login?lang=zh" class="lang-btn {% if lang == 'zh' %}active{% endif %}">中文</a>
        <a href="/login?lang=en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
    </div>

    <!-- Header -->
    <div class="header">
        <a href="/?lang=en" class="logo">
            <div class="logo-icon">🌱</div>
            <div class="logo-text">Carbon<span>Pass</span></div>
        </a>
        <div class="nav-menu">
            <a href="/contact?lang=en" class="nav-item">Contact</a>
            <a href="/receipt?lang=en" class="nav-item">Receipt OCR</a>
            <a href="/carbon?lang=en" class="nav-item">Carbon Footprint</a>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h1 class="login-title">Login to CarbonPass</h1>
            <p class="login-subtitle">Sign in with Google to start your carbon management journey</p>

            <a href="/login/google" class="google-btn">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </a>

            <div class="divider">or</div>

            <a href="/?lang=en" class="skip-btn">Skip, use without login</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        CarbonPass · 2024 · <span>Carbon Neutrality</span> Smart Carbon Management Platform
    </div>
</body>
</html>
