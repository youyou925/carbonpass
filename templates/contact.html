<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - 碳迹智识</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C853;
            --primary-light: #00E676;
            --primary-dark: #00A844;
            --accent: #00B0FF;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-hint: #999999;
            --border: #E8ECF0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* Header */
        .header {
            background: var(--card-bg);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--primary);
        }

        .nav-menu {
            display: flex;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        /* Main */
        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 40px;
        }

        /* Contact Card */
        .contact-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 24px;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .contact-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .contact-item:first-child {
            padding-top: 0;
        }

        .contact-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .contact-item:nth-child(1) .contact-icon {
            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
        }

        .contact-item:nth-child(2) .contact-icon {
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
        }

        .contact-item:nth-child(3) .contact-icon {
            background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%);
        }

        .contact-content {
            flex: 1;
        }

        .contact-label {
            font-size: 13px;
            color: var(--text-hint);
            margin-bottom: 4px;
        }

        .contact-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .contact-value a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 32px;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg);
            transition: border-color 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .form-input::placeholder {
            color: var(--text-hint);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 200, 83, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Success Message */
        .success-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-msg.show {
            display: block;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .success-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .success-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-hint);
            font-size: 12px;
        }

        .footer span {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">
            <div class="logo-icon">🌱</div>
            <div class="logo-text">碳迹<span>智识</span></div>
        </a>
        <div class="nav-menu">
            <a href="/contact" class="nav-item active">Contact Me</a>
            <a href="/receipt" class="nav-item">票据识别</a>
            <a href="/carbon" class="nav-item">碳足迹核算</a>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <h1 class="page-title">📧 Contact Me</h1>
        <p class="page-subtitle">期待与您的交流与合作</p>

        <!-- Contact Info -->
        <div class="contact-card">
            <div class="contact-item">
                <div class="contact-icon">📧</div>
                <div class="contact-content">
                    <div class="contact-label">电子邮件</div>
                    <div class="contact-value">
                        <a href="mailto:contact@carbon.tech">contact@carbon.tech</a>
                    </div>
                </div>
            </div>

            <div class="contact-item">
                <div class="contact-icon">🌐</div>
                <div class="contact-content">
                    <div class="contact-label">官方网站</div>
                    <div class="contact-value">
                        <a href="#">www.carbon-tech.cn</a>
                    </div>
                </div>
            </div>

            <div class="contact-item">
                <div class="contact-icon">💬</div>
                <div class="contact-content">
                    <div class="contact-label">微信二维码</div>
                    <div class="contact-value">请扫描下方二维码</div>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="form-card">
            <div class="form-title">✉️ 发送消息</div>

            <div id="formContent">
                <div class="form-group">
                    <label class="form-label">您的姓名</label>
                    <input type="text" class="form-input" id="nameInput" placeholder="请输入您的姓名">
                </div>

                <div class="form-group">
                    <label class="form-label">电子邮箱</label>
                    <input type="email" class="form-input" id="emailInput" placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">留言内容</label>
                    <textarea class="form-input" id="messageInput" placeholder="请输入您的留言或建议..."></textarea>
                </div>

                <button class="submit-btn" onclick="submitForm()">发送消息</button>
            </div>

            <div class="success-msg" id="successMsg">
                <div class="success-icon">✓</div>
                <div class="success-title">消息已发送</div>
                <div class="success-text">感谢您的留言，我们会尽快回复您</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        碳迹智识 · 2024 · <span>双碳政策</span>下的智能碳管理平台
    </div>

    <script>
        function submitForm() {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const message = document.getElementById('messageInput').value.trim();

            if (!name || !email || !message) {
                alert('请填写完整信息');
                return;
            }

            // Simple email validation
            if (!email.includes('@') || !email.includes('.')) {
                alert('请输入有效的电子邮箱');
                return;
            }

            // Hide form, show success
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successMsg').classList.add('show');

            // In a real app, you would send the data to a server here
            console.log('Form submitted:', { name, email, message });
        }
    </script>
</body>
</html>
